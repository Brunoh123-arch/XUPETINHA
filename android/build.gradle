// Top-level build file — Uppi Android
buildscript {
    ext {
        // Versoes atualizadas — compativel com Capacitor 8
        compileSdkVersion    = 35
        targetSdkVersion     = 35
        minSdkVersion        = 26      // Android 8.0+ (98% dos dispositivos ativos)
        buildToolsVersion    = "35.0.0"

        androidxActivityVersion          = '1.9.0'
        androidxAppCompatVersion         = '1.7.0'
        androidxCoordinatorLayoutVersion = '1.2.0'
        androidxCoreVersion              = '1.13.1'
        androidxFragmentVersion          = '1.8.1'
        coreSplashScreenVersion          = '1.0.1'
        androidxWebkitVersion            = '1.11.0'
        junitVersion                     = '4.13.2'
        androidxJunitVersion             = '1.2.1'
        androidxEspressoCoreVersion      = '3.6.1'
        cordovaAndroidVersion            = '10.1.1'
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.5.0'
        classpath 'com.google.gms:google-services:4.4.2'     // Firebase / FCM
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
