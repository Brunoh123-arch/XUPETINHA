# Uppi Gradle Properties
# ============================================================

# Performance: aumenta heap do Gradle para evitar OOM em builds grandes
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError

# Builds paralelos e incrementais
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true
org.gradle.daemon=true

# AndroidX obrigatorio para Capacitor 8
android.useAndroidX=true

# Jetifier: converte bibliotecas legadas de Support Library para AndroidX
android.enableJetifier=false

# Kotlin
kotlin.code.style=official

# R8: ativa full mode para maior otimizacao no release
android.enableR8.fullMode=true

# Suprime avisos nao criticos
org.gradle.warning.mode=none
